<template>
    <lightning-card title="Oportunidades da conta">
        <template lwc:if={records}>
            <div class="slds-m-around_medium">
                <lightning-datatable
                key-field="Id"
                data={records}
                columns={columns}
                hide-checkbox-column>
            </lightning-datatable>
            </div>
        </template>

        <template lwc:else>
            <p class="slds-p-around_medium">No opportunities found.</p>
        </template>
    </lightning-card>
</template>
